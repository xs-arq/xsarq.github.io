<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XS | arquitectura • gráfica • bim</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Roboto+Mono&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Tu paleta de colores y variables */
        :root {
            --bg-hielo: #ffffff;
            --texto-tinta: #121212;
            --azul-acero: #4A6FA5;
            --morado-amatista: #7B61FF;
            --rosa-polvo: #D8BFD8;
        }

        body {
            background-color: var(--bg-hielo);
            color: var(--texto-tinta);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilo para Títulos */
        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Estilo Técnico (BIM / Cotas) */
        .tecnico {
            font-family: 'Roboto Mono', monospace;
            color: var(--azul-acero);
            font-size: 0.9em;
        }

        /* Contenedor principal */
        .contenedor {
            max-width: 1000px;
            width: 90%;
            margin-top: 50px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 100px 0;
            border-bottom: 1px solid var(--rosa-polvo);
        }

        .hero h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        /* --- GRILLA DE PORTAFOLIO --- */
        .grilla-portafolio {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 30px;
            width: 100%;
        }

        .proyecto-card {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        /* Efecto al pasar el mouse (hover) */
        .proyecto-card:hover {
            transform: translateY(-5px);
        }

        .proyecto-img {
            width: 100%;
            aspect-ratio: 4/3; /* Mantiene un formato horizontal uniforme */
            object-fit: cover;
            background-color: #E5E7EB; /* Gris de fondo mientras carga */
            margin-bottom: 15px;
            filter: grayscale(15%); /* Un poco desaturado para mantener tono frío */
            transition: filter 0.3s ease;
        }

        .proyecto-card:hover .proyecto-img {
            filter: grayscale(0%); /* Vuelve al color original al pasar el mouse */
        }

        .proyecto-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .proyecto-titulo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.1em;
            margin: 0;
            text-transform: uppercase;
        }

        .proyecto-tags {
            font-family: 'Roboto Mono', monospace;
            color: var(--azul-acero);
            font-size: 0.8em;
            text-transform: uppercase;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="hero">
            <img src="xs.png" alt="Logo xs_arq" style="max-width: 250px; margin-bottom: 20px;">
            <h1 style="display: none;">xs_arq</h1>
            <p>La lógica de lo mínimo.</p>
            <p class="tecnico">[ arquitectura • gráfica • bim ]</p>
        </div>

  <div style="margin-top: 50px; width: 100%;">
            <h2>Portafolio</h2>
            
            <div class="grilla-portafolio">
                
                <a href="#" class="proyecto-card">
                    <img src="https://via.placeholder.com/600x450/e0e0e0/a0a0a0?text=Render+Leon+Prado" alt="Casa León Prado" class="proyecto-img">
                    <div class="proyecto-info">
                        <p class="proyecto-tags">[ 2026 / VIVIENDA / 130m2 ]</p>
                        <p class="proyecto-titulo">CASA LEÓN PRADO</p>
                    </div>
                </a>

            </div>
        </div>
        
<div style="margin-top: 50px; width: 100%;">
        
    <div style="margin-top: 50px; padding-bottom: 100px;">
            <h2>Contacto</h2>
            <p>Santiago, Chile</p>
            <p class="tecnico">IG: @xs_arq</p>
        </div>
    </div>

</body>
</html>
